# Tax and reporting parameters — copy to settings.yaml and edit:
#   cp config/settings.example.yaml config/settings.yaml
# settings.yaml is gitignored: your personal rates stay off the repo.
# All amounts in EUR unless noted.

tax:
  # --- Spain (residence country, taxes first) ---
  # Savings-income brackets, marginal rates (2025 law — verify yearly).
  spain_brackets:
    - [6000, 0.19]
    - [50000, 0.21]
    - [200000, 0.23]
    - [300000, 0.27]
    - [.inf, 0.30]
  # Gains already realized this calendar year in Spain (stacks brackets).
  # Phase 1: set manually; later derived from the trades table.
  es_ytd_realized_gains: 0

  # --- US (citizenship-based taxation) ---
  us_ltcg_rate: 0.15        # your long-term capital gains bracket (0 / 0.15 / 0.20)
  us_stcg_rate: 0.32        # your ordinary marginal rate for short-term gains
  apply_niit: true          # +3.8% Net Investment Income Tax if MAGI over threshold

  # Simplified foreign-tax-credit model: effective tax on a sale = max(ES, US).
  # Good enough for ranking decisions; not a filing-grade calculation.

optimizer:
  # Extra buyable tickers beyond current holdings (careful: as a US person in
  # the EU, individual stocks are safe; non-US funds/ETFs are PFICs).
  universe: []
  lookback_days: 756        # ~3y of daily returns for covariance/HRP
  backtest_window_days: 504 # trailing window for walk-forward backtest
  max_weight: 0.25          # per-asset cap on HRP target weight
  risk_aversion: 5.0        # EUR penalty per unit of annualized tracking variance x wealth
  tax_aversion: 1.0         # 1.0 = tax counted at face value; higher = more reluctant to sell
  fee_rate: 0.001           # round-trip friction on turnover
  min_trade_eur: 1000       # drop recommended trades smaller than this
  min_cash_eur: 2000        # cash floor after trading

report:
  # Minimum unrealized loss (EUR) for a lot to appear as a harvest candidate.
  harvest_min_loss_eur: 500
  # Wash-sale lookback windows checked against recent buys in the trades table.
  wash_sale_days_us: 30     # 30 days before/after (IRC §1091)
  wash_sale_days_es: 61     # 2 months (norma antiaplicación, listed securities)
