name: debug-secrets
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Hash secrets (values never printed)
        env:
          T: ${{ secrets.IBKR_FLEX_TOKEN }}
          Q: ${{ secrets.IBKR_FLEX_QUERY_ID }}
        run: |
          printf %s "$T" | sha256sum | cut -c1-16
          printf %s "$Q" | sha256sum | cut -c1-16
          curl -s "https://ndcdyn.interactivebrokers.com/AccountManagement/FlexWebService/SendRequest?t=$T&q=$Q&v=3" | grep -oE "<Status>[^<]*|<ErrorCode>[^<]*|<ErrorMessage>[^<]*" || true
